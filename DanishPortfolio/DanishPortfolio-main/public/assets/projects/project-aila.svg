<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#111a33"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="68" text-anchor="middle" fill="#fff" font-family="Arial" font-size="52" font-weight="800">AILA</text>
<text x="600" y="106" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="22">AI Leadership Avatar · Illinois Tech Leadership Academy</text>

<!-- Avatar circle -->
<g filter="url(#s)">
  <circle cx="300" cy="360" r="160" fill="#111a33" stroke="url(#g)" stroke-width="5"/>
  <circle cx="300" cy="360" r="130" fill="none" stroke="#ff7a1a" stroke-width="1.5" opacity=".3" stroke-dasharray="6,5"/>
