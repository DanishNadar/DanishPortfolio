  <circle cx="335" cy="330" r="18" fill="#ff7a1a" opacity=".85"/>
  <path d="M248 385 Q300 420 352 385" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <!-- Halo rings -->
  <circle cx="300" cy="360" r="148" fill="none" stroke="url(#g)" stroke-width="2" opacity=".4" stroke-dasharray="4,8"/>
</g>

