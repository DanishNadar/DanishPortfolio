<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="68" text-anchor="middle" fill="#fff" font-family="Arial" font-size="48" font-weight="800">Phishing Email Detector</text>
<text x="600" y="104" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="21">Random Forest Classifier · NLP Features · 97.4% Accuracy</text>

<!-- Email input panel -->
<g filter="url(#s)">
  <rect x="60" y="136" width="380" height="400" rx="18" fill="#111a33" stroke="rgba(185,199,230,.2)" stroke-width="1.5"/>
  <rect x="60" y="136" width="380" height="44" rx="18" fill="#0d1628"/>
  <rect x="60" y="160" width="380" height="16" rx="0" fill="#0d1628"/>
  <text x="250" y="162" text-anchor="middle" fill="#8894a8" font-family="monospace" font-size="13">suspicious_email.txt</text>

  <text x="88" y="206" fill="#ff5f57" font-family="monospace" font-size="12">From: security@paypa1-verify.com</text>
  <text x="88" y="226" fill="#8894a8" font-family="monospace" font-size="12">Subject: URGENT: Account suspended!</text>
  <text x="88" y="246" fill="#8894a8" font-family="monospace" font-size="12">──────────────────────────────────</text>
  <text x="88" y="266" fill="#b9c7e6" font-family="monospace" font-size="11">Dear valued customer,</text>
  <text x="88" y="284" fill="#b9c7e6" font-family="monospace" font-size="11">Your account has been SUSPENDED.</text>
  <text x="88" y="302" fill="#b9c7e6" font-family="monospace" font-size="11">CLICK HERE IMMEDIATELY to verify</text>
  <text x="88" y="320" fill="#ff7a1a" font-family="monospace" font-size="11">http://paypa1-verify.com/login</text>

  <!-- Feature extraction -->
  <text x="250" y="358" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="13" font-weight="700">Extracted Features</text>
  <rect x="80" y="368" width="160" height="22" rx="5" fill="#0d1628"/>
  <text x="160" y="383" text-anchor="middle" fill="#ff5f57" font-family="monospace" font-size="10">url_count: 1 (suspicious)</text>
  <rect x="248" y="368" width="172" height="22" rx="5" fill="#0d1628"/>
  <text x="334" y="383" text-anchor="middle" fill="#ff5f57" font-family="monospace" font-size="10">caps_ratio: 0.18 (high)</text>
  <rect x="80" y="396" width="160" height="22" rx="5" fill="#0d1628"/>
  <text x="160" y="411" text-anchor="middle" fill="#ff5f57" font-family="monospace" font-size="10">urgency_words: 4</text>
  <rect x="248" y="396" width="172" height="22" rx="5" fill="#0d1628"/>
  <text x="334" y="411" text-anchor="middle" fill="#ff5f57" font-family="monospace" font-size="10">domain_age: 12 days</text>
  <rect x="80" y="424" width="160" height="22" rx="5" fill="#0d1628"/>
  <text x="160" y="439" text-anchor="middle" fill="#febc2e" font-family="monospace" font-size="10">html_links: 0</text>
  <rect x="248" y="424" width="172" height="22" rx="5" fill="#0d1628"/>
  <text x="334" y="439" text-anchor="middle" fill="#ff5f57" font-family="monospace" font-size="10">spf_fail: true</text>

  <!-- Verdict -->
  <rect x="80" y="464" width="340" height="52" rx="12" fill="#2a0d0d" stroke="#ff5f57" stroke-width="2"/>
  <text x="250" y="486" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="15" font-weight="800">⚠ PHISHING DETECTED</text>
  <text x="250" y="504" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="11">Confidence: 98.3% · Random Forest prediction</text>
</g>

<!-- Classifier panel -->
<g filter="url(#s)" transform="translate(500,136)">
  <rect x="0" y="0" width="640" height="400" rx="18" fill="#0d1628" stroke="url(#g)" stroke-width="2"/>
  <text x="320" y="34" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="16" font-weight="700">Random Forest Pipeline</text>

  <!-- Tree visualization -->
  <!-- Root node -->
  <rect x="260" y="56" width="120" height="38" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="2"/>
  <text x="320" y="80" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">url_count &gt; 0?</text>

  <line x1="260" y1="75" x2="160" y2="116" stroke="#ff7a1a" stroke-width="1.5"/>
  <line x1="380" y1="75" x2="480" y2="116" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="200" y="108" fill="#28c840" font-family="Arial" font-size="10">No</text>
  <text x="436" y="108" fill="#ff5f57" font-family="Arial" font-size="10">Yes</text>

  <rect x="100" y="116" width="120" height="38" rx="8" fill="#111a33" stroke="#ffd166" stroke-width="1.5"/>
  <text x="160" y="140" text-anchor="middle" fill="#ffd166" font-family="Arial" font-size="11">caps_ratio &gt; 0.1?</text>
  <rect x="420" y="116" width="120" height="38" rx="8" fill="#111a33" stroke="#ffd166" stroke-width="1.5"/>
  <text x="480" y="140" text-anchor="middle" fill="#ffd166" font-family="Arial" font-size="11">domain_age &lt; 30?</text>

  <line x1="100" y1="135" x2="60" y2="176" stroke="#ffd166" stroke-width="1.2"/>
  <line x1="220" y1="135" x2="260" y2="176" stroke="#ffd166" stroke-width="1.2"/>
  <line x1="420" y1="135" x2="380" y2="176" stroke="#ffd166" stroke-width="1.2"/>
  <line x1="540" y1="135" x2="580" y2="176" stroke="#ffd166" stroke-width="1.2"/>

  <rect x="20" y="176" width="80" height="30" rx="6" fill="#1a3320" stroke="#28c840" stroke-width="1.5"/>
  <text x="60" y="195" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="10">Safe ✓</text>
  <rect x="220" y="176" width="80" height="30" rx="6" fill="#2a0d0d" stroke="#ff5f57" stroke-width="1.5"/>
  <text x="260" y="195" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="10">Phish ✗</text>
  <rect x="340" y="176" width="80" height="30" rx="6" fill="#2a0d0d" stroke="#ff5f57" stroke-width="1.5"/>
  <text x="380" y="195" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="10">Phish ✗</text>
  <rect x="540" y="176" width="80" height="30" rx="6" fill="#1a3320" stroke="#28c840" stroke-width="1.5"/>
  <text x="580" y="195" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="10">Safe ✓</text>

  <!-- Confusion matrix -->
  <text x="320" y="246" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="13" font-weight="700">Confusion Matrix (test set)</text>
  <rect x="180" y="260" width="90" height="40" rx="6" fill="#1a3320"/>
  <text x="225" y="285" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="18" font-weight="800">4821</text>
  <rect x="276" y="260" width="90" height="40" rx="6" fill="#2a0d0d"/>
  <text x="321" y="285" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="18" font-weight="800">127</text>
  <rect x="180" y="306" width="90" height="40" rx="6" fill="#2a0d0d"/>
  <text x="225" y="331" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="18" font-weight="800">89</text>
  <rect x="276" y="306" width="90" height="40" rx="6" fill="#1a3320"/>
  <text x="321" y="331" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="18" font-weight="800">5063</text>
  <text x="225" y="356" text-anchor="middle" fill="#8894a8" font-family="Arial" font-size="10">True Safe</text>
  <text x="321" y="356" text-anchor="middle" fill="#8894a8" font-family="Arial" font-size="10">True Phish</text>

  <!-- Metrics -->
  <rect x="400" y="258" width="210" height="92" rx="10" fill="#111a33"/>
  <text x="505" y="282" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="13" font-weight="700">Metrics</text>
  <text x="415" y="302" fill="#b9c7e6" font-family="Arial" font-size="12">Accuracy</text><text x="600" y="302" text-anchor="end" fill="#28c840" font-family="Arial" font-size="12" font-weight="700">97.4%</text>
  <text x="415" y="320" fill="#b9c7e6" font-family="Arial" font-size="12">Precision</text><text x="600" y="320" text-anchor="end" fill="#28c840" font-family="Arial" font-size="12" font-weight="700">97.6%</text>
  <text x="415" y="338" fill="#b9c7e6" font-family="Arial" font-size="12">Recall</text><text x="600" y="338" text-anchor="end" fill="#28c840" font-family="Arial" font-size="12" font-weight="700">98.3%</text>

  <!-- Stack -->
  <text x="80" y="384" fill="#ff7a1a" font-family="Arial" font-size="12">Python</text>
  <text x="156" y="384" fill="#ff7a1a" font-family="Arial" font-size="12">scikit-learn</text>
  <text x="256" y="384" fill="#ff7a1a" font-family="Arial" font-size="12">NLTK</text>
  <text x="316" y="384" fill="#ff7a1a" font-family="Arial" font-size="12">pandas</text>
  <text x="396" y="384" fill="#ff7a1a" font-family="Arial" font-size="12">Jupyter Notebook</text>
</g>

<text x="600" y="594" text-anchor="middle" fill="#fff" font-family="Arial" font-size="17" font-weight="700">NLP feature engineering · Random Forest · 10,100-email dataset · 97.4% accuracy</text>
<text x="600" y="624" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="14">URL pattern analysis · urgency detection · sender spoofing heuristics</text>
</svg>
