<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="68" text-anchor="middle" fill="#fff" font-family="Arial" font-size="44" font-weight="800">Course Recommendation Engine</text>
<text x="600" y="104" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="21">TF-IDF · Cosine Similarity · Content-Based Filtering</text>

<!-- Vector space visualization -->
<g filter="url(#s)">
  <rect x="60" y="136" width="500" height="420" rx="18" fill="#0d1628" stroke="url(#g)" stroke-width="2"/>
  <text x="310" y="168" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="15" font-weight="700">Course Similarity Vector Space</text>

  <!-- Axes -->
  <line x1="100" y1="490" x2="520" y2="490" stroke="#16213d" stroke-width="2"/>
  <line x1="100" y1="490" x2="100" y2="190" stroke="#16213d" stroke-width="2"/>
  <text x="310" y="510" text-anchor="middle" fill="#8894a8" font-family="Arial" font-size="11">TF-IDF dimension 1</text>
  <text x="76" y="340" text-anchor="middle" fill="#8894a8" font-family="Arial" font-size="11" transform="rotate(-90, 76, 340)">TF-IDF dimension 2</text>

  <!-- Course clusters -->
  <!-- ML cluster -->
  <circle cx="310" cy="310" r="52" fill="#ff7a1a" fill-opacity=".08" stroke="#ff7a1a" stroke-width="1" stroke-dasharray="5,4"/>
  <circle cx="310" cy="310" r="7" fill="#ff7a1a"/>
  <text x="310" y="296" text-anchor="middle" fill="#fff" font-family="Arial" font-size="10">CS 584</text>
  <circle cx="280" cy="330" r="5" fill="#ffd166" opacity=".85"/>
  <text x="258" y="344" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="9">CS 583</text>
  <circle cx="338" cy="288" r="5" fill="#ffd166" opacity=".85"/>
  <text x="355" y="284" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="9">CS 480</text>
  <text x="310" y="370" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="10" font-weight="700">ML / AI cluster</text>

  <!-- Systems cluster -->
  <circle cx="175" cy="245" r="44" fill="#28c840" fill-opacity=".07" stroke="#28c840" stroke-width="1" stroke-dasharray="5,4"/>
  <circle cx="175" cy="245" r="6" fill="#28c840" opacity=".9"/>
  <text x="175" y="232" text-anchor="middle" fill="#fff" font-family="Arial" font-size="10">CS 450</text>
  <circle cx="148" cy="260" r="4" fill="#28c840" opacity=".7"/>
  <circle cx="202" cy="228" r="4" fill="#28c840" opacity=".7"/>
  <text x="175" y="298" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="10" font-weight="700">Systems cluster</text>

  <!-- Data cluster -->
  <circle cx="430" cy="420" r="40" fill="#8aa9ff" fill-opacity=".08" stroke="#8aa9ff" stroke-width="1" stroke-dasharray="5,4"/>
  <circle cx="430" cy="420" r="6" fill="#8aa9ff" opacity=".9"/>
  <text x="430" y="407" text-anchor="middle" fill="#fff" font-family="Arial" font-size="10">CS 425</text>
  <circle cx="408" cy="436" r="4" fill="#8aa9ff" opacity=".7"/>
  <circle cx="454" cy="405" r="4" fill="#8aa9ff" opacity=".7"/>
  <text x="430" y="468" text-anchor="middle" fill="#8aa9ff" font-family="Arial" font-size="10" font-weight="700">Databases cluster</text>

  <!-- User query point -->
  <circle cx="290" cy="340" r="9" fill="none" stroke="#fff" stroke-width="2.5"/>
  <circle cx="290" cy="340" r="4" fill="#fff"/>
  <text x="262" y="358" text-anchor="middle" fill="#fff" font-family="Arial" font-size="9">Query</text>

  <!-- Similarity lines -->
  <line x1="290" y1="340" x2="310" y2="310" stroke="#fff" stroke-width="1" stroke-dasharray="4,3" opacity=".6"/>
  <line x1="290" y1="340" x2="280" y2="330" stroke="#fff" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>
  <line x1="290" y1="340" x2="338" y2="288" stroke="#fff" stroke-width="1" stroke-dasharray="4,3" opacity=".35"/>
</g>

<!-- Pipeline panel -->
<g filter="url(#s)" transform="translate(620,136)">
  <rect x="0" y="0" width="520" height="420" rx="18" fill="#111a33" stroke="url(#g)" stroke-width="2"/>
  <text x="260" y="34" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="15" font-weight="700">Recommendation Pipeline</text>

  <!-- Input -->
  <rect x="30" y="54" width="460" height="46" rx="10" fill="#0d1628" stroke="url(#g)" stroke-width="1.5"/>
  <text x="260" y="72" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="13">User input: "machine learning algorithms"</text>
  <text x="260" y="90" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="11">CountVectorizer → token frequency matrix</text>

  <line x1="260" y1="100" x2="260" y2="118" stroke="#ff7a1a" stroke-width="2"/>
  <polygon points="255,118 265,118 260,128" fill="#ff7a1a"/>

  <!-- TF-IDF -->
  <rect x="30" y="128" width="460" height="46" rx="10" fill="#0d1628" stroke="url(#g)" stroke-width="1.5"/>
  <text x="260" y="147" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="13">TF-IDF vectorization (5,000+ course descriptions)</text>
  <text x="260" y="165" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="11">Term weight: tf(t,d) × log(N/df(t))</text>

  <line x1="260" y1="174" x2="260" y2="192" stroke="#ff7a1a" stroke-width="2"/>
  <polygon points="255,192 265,192 260,202" fill="#ff7a1a"/>

  <!-- Cosine similarity -->
  <rect x="30" y="202" width="460" height="46" rx="10" fill="#0d1628" stroke="#28c840" stroke-width="1.5"/>
  <text x="260" y="221" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="13">Cosine Similarity computation</text>
  <text x="260" y="239" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">sim(A,B) = A·B / (|A| × |B|)</text>

  <line x1="260" y1="248" x2="260" y2="266" stroke="#ff7a1a" stroke-width="2"/>
  <polygon points="255,266 265,266 260,276" fill="#ff7a1a"/>

  <!-- Top-N results -->
  <rect x="30" y="276" width="460" height="114" rx="10" fill="#0d1628" stroke="url(#g)" stroke-width="1.5"/>
  <text x="260" y="298" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="13" font-weight="700">Top-5 Recommendations</text>
  <rect x="50" y="308" width="420" height="22" rx="5" fill="#111a33"/>
  <text x="260" y="323" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">#1 CS 584 — Machine Learning  similarity: 0.94</text>
  <rect x="50" y="334" width="420" height="22" rx="5" fill="#111a33"/>
  <text x="260" y="349" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">#2 CS 583 — Intelligent Systems  similarity: 0.89</text>
  <rect x="50" y="360" width="420" height="22" rx="5" fill="#111a33"/>
  <text x="260" y="375" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">#3 CS 480 — Neural Networks  similarity: 0.82</text>
</g>

<text x="600" y="610" text-anchor="middle" fill="#fff" font-family="Arial" font-size="17" font-weight="700">Python · scikit-learn · TF-IDF · Cosine Similarity · 5,000+ IIT courses</text>
<text x="600" y="640" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="14">Content-based filtering · NLP text analysis · Illinois Tech course catalog</text>
</svg>
