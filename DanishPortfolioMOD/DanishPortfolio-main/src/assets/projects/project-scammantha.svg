<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <linearGradient id="danger" x1="0" x2="1"><stop stop-color="#ff3b3b"/><stop offset="1" stop-color="#ff7a1a"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="72" text-anchor="middle" fill="#fff" font-family="Arial" font-size="52" font-weight="800">Scammantha</text>
<text x="600" y="112" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="22">Interactive Scam-Baiting Education Platform</text>

<!-- Mission panel -->
<g filter="url(#s)">
  <rect x="80" y="148" width="480" height="380" rx="16" fill="#0d1628" stroke="#ff3b3b" stroke-width="2"/>
  <rect x="80" y="148" width="480" height="50" rx="16" fill="#1a0a0a"/>
  <rect x="80" y="178" width="480" height="20" rx="0" fill="#1a0a0a"/>
  <text x="320" y="178" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="14" font-weight="700">⚠ MISSION: Tech Support Panic</text>

  <text x="120" y="228" fill="#ffd166" font-family="Arial" font-size="13" font-weight="700">SCAMMER SCRIPT:</text>
  <rect x="100" y="236" width="440" height="52" rx="8" fill="#1a0a0a"/>
  <text x="120" y="254" fill="#ff9999" font-family="Arial" font-size="12">"Your computer has been compromised. I need</text>
  <text x="120" y="272" fill="#ff9999" font-family="Arial" font-size="12">remote access NOW or you'll lose everything."</text>

  <text x="120" y="316" fill="#b9c7e6" font-family="Arial" font-size="13" font-weight="700">YOUR MOVE:</text>
  <rect x="100" y="324" width="200" height="36" rx="8" fill="#16213d" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="200" y="347" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="12">Deny remote access</text>
  <rect x="314" y="324" width="200" height="36" rx="8" fill="#16213d" stroke="#b9c7e6" stroke-width="1"/>
  <text x="414" y="347" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12">Ask for a callback number</text>
  <rect x="100" y="368" width="200" height="36" rx="8" fill="#16213d" stroke="#b9c7e6" stroke-width="1"/>
  <text x="200" y="391" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12">Hang up immediately</text>
  <rect x="314" y="368" width="200" height="36" rx="8" fill="#16213d" stroke="#b9c7e6" stroke-width="1"/>
  <text x="414" y="391" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12">Request written documentation</text>

  <text x="120" y="432" fill="#28c840" font-family="Arial" font-size="12">✓ Real companies never rush you into secrecy or remote access</text>
  <text x="120" y="452" fill="#28c840" font-family="Arial" font-size="12">✓ Gift card requests = guaranteed scam signal</text>
  <text x="120" y="472" fill="#28c840" font-family="Arial" font-size="12">✓ Urgency and fear are their main tools</text>

  <rect x="100" y="490" width="440" height="28" rx="6" fill="#0a1020"/>
  <rect x="100" y="490" width="264" height="28" rx="6" fill="url(#g)" opacity=".7"/>
  <text x="320" y="509" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Progress: 60%</text>
</g>

<!-- Scammer mood tracker -->
<g filter="url(#s)">
  <rect x="640" y="148" width="480" height="180" rx="16" fill="#0d1628" stroke="url(#g)" stroke-width="2"/>
  <text x="880" y="184" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="700">Scammer Mood Tracker</text>
  <text x="880" y="208" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="13">Real-time emotional pressure response</text>

  <text x="670" y="240" fill="#b9c7e6" font-family="Arial" font-size="12">Confidence</text>
  <rect x="760" y="228" width="280" height="14" rx="5" fill="#16213d"/>
  <rect x="760" y="228" width="168" height="14" rx="5" fill="#ff3b3b" opacity=".8"/>

  <text x="670" y="268" fill="#b9c7e6" font-family="Arial" font-size="12">Urgency</text>
  <rect x="760" y="256" width="280" height="14" rx="5" fill="#16213d"/>
  <rect x="760" y="256" width="224" height="14" rx="5" fill="#ffd166" opacity=".8"/>

  <text x="670" y="296" fill="#b9c7e6" font-family="Arial" font-size="12">Aggression</text>
  <rect x="760" y="284" width="280" height="14" rx="5" fill="#16213d"/>
  <rect x="760" y="284" width="84" height="14" rx="5" fill="#28c840" opacity=".8"/>

  <text x="880" y="320" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="13">Mood shifts dynamically with your responses</text>
</g>

<!-- Live call interface -->
<g filter="url(#s)">
  <rect x="640" y="348" width="480" height="180" rx="16" fill="#0d1628" stroke="url(#g)" stroke-width="2"/>
  <text x="880" y="382" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="700">Live Call Simulation</text>

  <circle cx="760" cy="440" r="36" fill="#1a0a0a" stroke="#ff3b3b" stroke-width="2"/>
  <text x="760" y="435" text-anchor="middle" fill="#ff5f57" font-family="Arial" font-size="22">📞</text>
  <text x="760" y="455" text-anchor="middle" fill="#ff9999" font-family="Arial" font-size="10">SCAMMER</text>

  <path d="M800 440 Q880 400 960 440" fill="none" stroke="#ff7a1a" stroke-width="2" stroke-dasharray="6,4"/>

  <circle cx="960" cy="440" r="36" fill="#0a1628" stroke="#28c840" stroke-width="2"/>
  <text x="960" y="435" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="22">🎤</text>
  <text x="960" y="455" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="10">YOU</text>

  <text x="880" y="500" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="13">Microphone API · Real-time interaction state</text>
</g>

<text x="600" y="620" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18" font-weight="700">Cybersecurity awareness through interactive simulation · scammantha.vercel.app</text>
<text x="600" y="652" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="14">Mission progression · Mood tracking · Live call simulation · Vercel deployment</text>
</svg>
