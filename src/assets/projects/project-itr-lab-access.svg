  <text x="760" y="323" fill="#b9c7e6" font-family="Arial" font-size="12">Danish N.  -  Mon 9am–12pm</text>
  <rect x="952" y="306" width="40" height="24" rx="5" fill="#28c840"/>
  <text x="972" y="322" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">✓</text>
  <rect x="736" y="342" width="268" height="32" rx="6" fill="#16213d"/>
  <text x="760" y="363" fill="#b9c7e6" font-family="Arial" font-size="12">Maria T.  -  Wed 2pm–5pm</text>
  <rect x="952" y="346" width="40" height="24" rx="5" fill="#28c840"/>
  <text x="972" y="362" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">✓</text>
  <rect x="736" y="382" width="268" height="32" rx="6" fill="#16213d"/>
  <text x="760" y="403" fill="#b9c7e6" font-family="Arial" font-size="12">Jake R.  -  Fri 10am–1pm</text>
  <rect x="952" y="386" width="40" height="24" rx="5" fill="#16213d" stroke="#ff7a1a" stroke-width="1"/>
  <text x="972" y="402" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="11">?</text>

  <!-- Discord status -->
  <rect x="736" y="428" width="268" height="100" rx="8" fill="#111a33"/>
  <text x="870" y="450" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12" font-weight="600">Discord Bot · Lab Status</text>
  <rect x="752" y="458" width="88" height="24" rx="5" fill="#28c840" opacity=".85"/>
  <text x="796" y="474" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11" font-weight="700">OPEN</text>
  <rect x="848" y="458" width="88" height="24" rx="5" fill="#16213d" stroke="#ff7a1a" stroke-width="1"/>
  <text x="892" y="474" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">LIMBO</text>
  <rect x="944" y="458" width="44" height="24" rx="5" fill="#ff5f57" opacity=".7"/>
  <text x="966" y="474" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">OFF</text>
  <text x="870" y="510" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">5 REST endpoints · API key auth</text>
</g>

<text x="600" y="610" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18" font-weight="700">Next.js 14 · Neon Postgres · Drizzle ORM · Nodemailer · Vercel</text>
<text x="600" y="640" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="15">Full-stack production app replacing manual lab coordination for Illinois Tech Robotics</text>
</svg>
