<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#1a2a4a"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity=".4"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="72" text-anchor="middle" fill="#fff" font-family="Arial" font-size="46" font-weight="800">Elevate Underground</text>
<text x="600" y="110" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="22">Illinois Tech Robotics · Lab Access Platform</text>

<!-- Main dashboard panel -->
<g filter="url(#s)">
  <rect x="160" y="148" width="880" height="420" rx="20" fill="url(#gb)" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Topbar -->
  <rect x="160" y="148" width="880" height="52" rx="20" fill="#111a33"/>
  <rect x="160" y="178" width="880" height="22" rx="0" fill="#111a33"/>
  <circle cx="196" cy="174" r="7" fill="#ff5f57"/>
