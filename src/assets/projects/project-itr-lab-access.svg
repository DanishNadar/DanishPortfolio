  <rect x="328" y="320" width="52" height="36" rx="6" fill="#ff7a1a" opacity=".8"/>
  <rect x="396" y="320" width="52" height="36" rx="6" fill="#16213d"/>
  <rect x="464" y="320" width="52" height="36" rx="6" fill="#ff7a1a" opacity=".6"/>
  <text x="354" y="343" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">Booked</text>
  <text x="490" y="343" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">Pending</text>
  <rect x="192" y="364" width="52" height="36" rx="6" fill="#ff7a1a" opacity=".7"/>
  <rect x="260" y="364" width="52" height="36" rx="6" fill="#16213d"/>
  <rect x="328" y="364" width="52" height="36" rx="6" fill="#16213d"/>
  <rect x="396" y="364" width="52" height="36" rx="6" fill="#ff7a1a" opacity=".8"/>
  <rect x="464" y="364" width="52" height="36" rx="6" fill="#16213d"/>
  <text x="218" y="387" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">Booked</text>
