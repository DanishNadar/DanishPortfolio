<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720">
<defs>
  <linearGradient id="g" x1="0" x2="1"><stop stop-color="#ff7a1a"/><stop offset="1" stop-color="#ffd166"/></linearGradient>
  <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="16" flood-opacity=".38"/></filter>
</defs>
<rect width="1200" height="720" rx="42" fill="#0b1020"/>
<text x="600" y="68" text-anchor="middle" fill="#fff" font-family="Arial" font-size="54" font-weight="800">JTR</text>
<text x="600" y="106" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="22">AI Job-Seeking Agent · Matching · Outreach · Automation</text>

<!-- Pipeline nodes -->
<g filter="url(#s)">
  <!-- User profile node -->
  <circle cx="180" cy="330" r="72" fill="#111a33" stroke="url(#g)" stroke-width="4"/>
  <text x="180" y="322" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="28">👤</text>
  <text x="180" y="348" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="700">Your Profile</text>
  <text x="180" y="366" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">Skills · Resume</text>

  <!-- Arrow 1 -->
  <path d="M252 330 L318 330" stroke="#ff7a1a" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="252" y1="330" x2="318" y2="330" stroke="#ff7a1a" stroke-width="3"/>
  <polygon points="318,322 334,330 318,338" fill="#ff7a1a"/>

  <!-- Matching engine -->
  <rect x="334" y="258" width="184" height="144" rx="18" fill="#111a33" stroke="url(#g)" stroke-width="3.5"/>
  <text x="426" y="300" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="16" font-weight="700">AI Matcher</text>
  <text x="426" y="320" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12">Job ↔ Profile scoring</text>
  <rect x="360" y="334" width="132" height="6" rx="3" fill="#16213d"/>
  <rect x="360" y="334" width="108" height="6" rx="3" fill="url(#g)" opacity=".8"/>
  <text x="426" y="362" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="12">Match: 94%</text>
  <text x="426" y="378" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">ML ranking pipeline</text>

  <!-- Arrow 2 -->
  <line x1="518" y1="330" x2="582" y2="330" stroke="#ff7a1a" stroke-width="3"/>
  <polygon points="582,322 598,330 582,338" fill="#ff7a1a"/>

  <!-- Job list -->
  <rect x="598" y="258" width="184" height="144" rx="18" fill="#111a33" stroke="url(#g)" stroke-width="3.5"/>
  <text x="690" y="292" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="15" font-weight="700">Ranked Jobs</text>
  <rect x="618" y="302" width="144" height="24" rx="6" fill="#16213d"/>
  <text x="690" y="318" text-anchor="middle" fill="#fff" font-family="Arial" font-size="11">AI Engineer — Anthropic #1</text>
  <rect x="618" y="332" width="144" height="24" rx="6" fill="#16213d"/>
  <text x="690" y="348" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">ML Engineer — OpenAI #2</text>
  <rect x="618" y="362" width="144" height="24" rx="6" fill="#16213d"/>
  <text x="690" y="378" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="11">AI Intern — DeepMind #3</text>

  <!-- Arrow 3 -->
  <line x1="782" y1="330" x2="846" y2="330" stroke="#ff7a1a" stroke-width="3"/>
  <polygon points="846,322 862,330 846,338" fill="#ff7a1a"/>

  <!-- Outreach -->
  <rect x="862" y="258" width="184" height="144" rx="18" fill="#111a33" stroke="url(#g)" stroke-width="3.5"/>
  <text x="954" y="292" text-anchor="middle" fill="#ff7a1a" font-family="Arial" font-size="15" font-weight="700">Auto Outreach</text>
  <text x="954" y="314" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="12">Personalized messages</text>
  <rect x="882" y="324" width="144" height="20" rx="5" fill="#16213d"/>
  <text x="954" y="338" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="10">✓ LinkedIn DM drafted</text>
  <rect x="882" y="350" width="144" height="20" rx="5" fill="#16213d"/>
  <text x="954" y="364" text-anchor="middle" fill="#28c840" font-family="Arial" font-size="10">✓ Cold email personalized</text>
  <rect x="882" y="376" width="144" height="20" rx="5" fill="#16213d"/>
  <text x="954" y="390" text-anchor="middle" fill="#febc2e" font-family="Arial" font-size="10">⏳ Follow-up scheduled</text>
</g>

<!-- Job board feeds -->
<g font-family="Arial" text-anchor="middle">
  <text x="600" y="466" fill="#b9c7e6" font-size="14">Job data sources</text>
  <rect x="200" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="255" y="501" fill="#ff7a1a" font-size="13">LinkedIn</text>
  <rect x="326" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="381" y="501" fill="#ff7a1a" font-size="13">Indeed</text>
  <rect x="452" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="507" y="501" fill="#ff7a1a" font-size="13">Greenhouse</text>
  <rect x="578" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="633" y="501" fill="#ff7a1a" font-size="13">Lever</text>
  <rect x="704" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="759" y="501" fill="#ff7a1a" font-size="13">Apollo.io</text>
  <rect x="830" y="480" width="110" height="34" rx="8" fill="#111a33" stroke="#ff7a1a" stroke-width="1.5"/>
  <text x="885" y="501" fill="#ff7a1a" font-size="13">Custom API</text>
</g>

<text x="600" y="572" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18" font-weight="700">Python · FastAPI · AI-assisted workflow · ML matching · Outreach automation</text>
<text x="600" y="604" text-anchor="middle" fill="#b9c7e6" font-family="Arial" font-size="14">Frames job-seeking as an operations problem — matching, outreach, and tracking in one system</text>
</svg>
