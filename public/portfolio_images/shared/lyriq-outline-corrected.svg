<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 589" fill="none">
  <defs>
    <filter id="glow" x="-8%" y="-32%" width="116%" height="164%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="g-main" x1="190" y1="140" x2="1840" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b8dcff" stop-opacity="0.96"/>
      <stop offset="0.48" stop-color="#d8eeff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#c6e4ff" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="g-accent" x1="190" y1="265" x2="1762" y2="255" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7eceff" stop-opacity="0.84"/>
      <stop offset="0.5" stop-color="#a4d8ff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#7ecaff" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="g-rear" x1="1660" y1="255" x2="1840" y2="278" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8cceff" stop-opacity="0.68"/>
      <stop offset="0.35" stop-color="#f4a0d0" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ff8ec6" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- ════════════════════════════════════════════════ -->
    <!-- ROOFLINE                                        -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="roofline" filter="url(#glow)">
      <path
        d="M 636 192
           C 722 156 882 106 1024 98
           C 1206  90 1480 106 1656 136
           C 1718 148 1756 164 1766 172"
        stroke="url(#g-main)"
        stroke-width="4.4"
        opacity="0.93"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- WINDOW GREENHOUSE: beltline + upper glass       -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="window_greenhouse" filter="url(#glow-soft)">
      <!-- lower beltline / window sill -->
      <path
        d="M 568 262
           C 678 252 902 238 1124 234
           C 1364 230 1566 226 1666 212
           C 1716 205 1754 194 1766 184"
        stroke="url(#g-accent)"
        stroke-width="3.3"
        opacity="0.82"
      />
      <!-- upper glass inner contour (gives cabin depth) -->
      <path
        d="M 636 207
           C 722 172 880 124 1022 116
           C 1204 108 1478 122 1654 151
           C 1716 161 1752 176 1762 184"
        stroke="url(#g-accent)"
        stroke-width="2.2"
        opacity="0.56"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- PILLARS: A-inner, B, C, D                       -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="pillars" filter="url(#glow-soft)">
      <!-- A-pillar inner windshield edge -->
      <path
        d="M 572 266 C 596 242 620 214 636 198"
        stroke="#8cceff"
        stroke-width="2.2"
        opacity="0.46"
      />
      <!-- B-pillar -->
      <path d="M 972 105 L 964 240" stroke="#8cceff" stroke-width="2.0" opacity="0.38"/>
      <!-- C-pillar -->
      <path d="M 1414 122 L 1447 232" stroke="#8cceff" stroke-width="2.0" opacity="0.38"/>
      <!-- D-pillar / rear quarter glass border -->
      <path d="M 1660 138 L 1700 212" stroke="#8cceff" stroke-width="2.0" opacity="0.44"/>
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- HOOD + FRONT FASCIA                             -->
    <!-- Front fascia raised to y=290 (was 322).        -->
    <!-- Hood now nearly flat — EV/SUV silhouette.      -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="hood_front_fascia" filter="url(#glow)">
      <!-- hood line (flat EV slope into A-pillar) -->
      <path
        d="M 192 290
           C 296 278 456 266 568 262
           L 636 192"
        stroke="url(#g-main)"
        stroke-width="4.2"
        opacity="0.90"
      />
      <!-- front fascia — tall, nearly vertical premium EV front -->
      <path
        d="M 192 290
           L 188 446
           L 203 468
           L 268 477
           L 322 478"
        stroke="url(#g-main)"
        stroke-width="4.0"
        opacity="0.85"
      />
      <!-- hood surface crease line -->
      <path
        d="M 268 286 C 366 278 462 271 560 268"
        stroke="url(#g-accent)"
        stroke-width="2.2"
        opacity="0.40"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- HEADLIGHT: DRL + lower fascia accent            -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="headlight" filter="url(#glow)">
      <!-- main headlight / DRL — runs near top of fascia -->
      <path
        d="M 196 280 C 222 268 256 262 284 259"
        stroke="#9ad4ff"
        stroke-width="3.6"
        opacity="0.94"
      />
      <!-- lower front bumper accent -->
      <path
        d="M 196 436 C 226 444 264 450 296 452"
        stroke="#7ec8ff"
        stroke-width="2.2"
        opacity="0.52"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- SIDE BODY LINES: shoulder + mid-body            -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="side_body_lines" filter="url(#glow-soft)">
      <!-- shoulder / belt line -->
      <path
        d="M 278 304
           C 386 292 544 278 716 272
           C 964 264 1270 262 1554 258
           C 1612 256 1654 254 1678 250"
        stroke="url(#g-accent)"
        stroke-width="2.6"
        opacity="0.56"
      />
      <!-- mid-body character line -->
      <path
        d="M 322 376
           C 444 366 646 352 904 346
           C 1164 341 1386 338 1584 334
           C 1622 333 1654 332 1672 331"
        stroke="url(#g-accent)"
        stroke-width="2.2"
        opacity="0.44"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- ROCKER LINE                                     -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="rocker_line" filter="url(#glow-soft)">
      <path d="M 590 475 L 1336 475" stroke="url(#g-main)" stroke-width="2.8" opacity="0.58"/>
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- FRONT WHEEL ARCH                                -->
    <!-- Centered on CSS wheel at x=432, y=411.         -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="front_wheel_arch" filter="url(#glow)">
      <path
        d="M 284 478
           C 292 386 346 300 432 288
           C 518 276 576 358 590 478"
        stroke="#9ad3ff"
        stroke-width="4.5"
        opacity="0.89"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- REAR WHEEL ARCH                                 -->
    <!-- Centered on CSS wheel at x=1491, y=411.        -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="rear_wheel_arch" filter="url(#glow)">
      <path
        d="M 1336 478
           C 1348 386 1408 300 1491 288
           C 1574 276 1648 360 1660 478"
        stroke="#9ad3ff"
        stroke-width="4.5"
        opacity="0.89"
      />
      <!-- rear quarter panel sweep above arch -->
      <path
        d="M 1491 290 C 1558 274 1628 260 1664 250"
        stroke="url(#g-accent)"
        stroke-width="2.0"
        opacity="0.40"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- REAR QUARTER: spoiler + inner hatch glass       -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="rear_quarter" filter="url(#glow-soft)">
      <!-- spoiler / deck lip at very top of rear -->
      <path
        d="M 1766 172 C 1796 170 1822 172 1842 178"
        stroke="url(#g-main)"
        stroke-width="2.4"
        opacity="0.54"
      />
      <!-- inner rear glass edge (gives hatch depth) -->
      <path
        d="M 1754 186 C 1788 200 1816 230 1828 272"
        stroke="url(#g-main)"
        stroke-width="2.2"
        opacity="0.42"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- REAR HATCH: slope + fascia + lower rear         -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="rear_hatch" filter="url(#glow)">
      <!-- roofline taper into hatch slope -->
      <path
        d="M 1766 172
           C 1802 182 1830 210 1842 258
           L 1842 284"
        stroke="url(#g-main)"
        stroke-width="4.2"
        opacity="0.87"
      />
      <!-- rear fascia (vertical) + lower corner -->
      <path
        d="M 1842 284
           L 1840 398
           L 1828 445
           L 1774 456"
        stroke="url(#g-main)"
        stroke-width="4.0"
        opacity="0.82"
      />
      <!-- lower rear body: arch corner to fascia corner -->
      <path
        d="M 1660 478 L 1774 456"
        stroke="url(#g-main)"
        stroke-width="3.6"
        opacity="0.74"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- TAILLIGHT: horizontal blade + vertical accent   -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="taillight" filter="url(#glow)">
      <!-- main horizontal taillight blade -->
      <path
        d="M 1728 280 L 1842 280"
        stroke="url(#g-rear)"
        stroke-width="5.0"
        opacity="0.88"
      />
      <!-- vertical lower accent -->
      <path
        d="M 1774 310 C 1758 324 1750 346 1748 368"
        stroke="#ff92cc"
        stroke-width="3.6"
        opacity="0.64"
      />
    </g>

    <!-- ════════════════════════════════════════════════ -->
    <!-- REAR BUMPER: upper trim + lower line            -->
    <!-- ════════════════════════════════════════════════ -->
    <g id="rear_bumper" filter="url(#glow-soft)">
      <!-- upper bumper trim -->
      <path
        d="M 1672 457 L 1792 451 L 1824 440"
        stroke="url(#g-main)"
        stroke-width="2.6"
        opacity="0.50"
      />
      <!-- lower bumper line -->
      <path
        d="M 1674 469 L 1800 464 L 1828 454"
        stroke="url(#g-main)"
        stroke-width="2.2"
        opacity="0.38"
      />
    </g>

  </g>
</svg>
